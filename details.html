<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Products Details</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="py-4 mx-3 bg-warning-subtle text-warning-emphasis">
      <h1 class="m-2">ProductHive</h1>
      <nav class="navbar navbar-expand-lg mx-3">
        <ul class="list-unstyled d-flex gap-5">
          <li>
            <a href="index.html" class="text-decoration-none text-black"
              >Home</a
            >
          </li>
          <li>
            <a href="products.html" class="text-decoration-none text-black"
              >Products</a
            >
          </li>
          <li>
            <a href="star-rated.html" class="text-decoration-none text-black"
              >Star Rated</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <main class="text-center">
      <h2 class="m-4">Product Details</h2>

      <div class="container my-4 col-md-6 mb-4 d-flex justify-content-center">
        <div class="card" style="width: 20rem">
          <div class="card-body bg-warning-subtle text-warning-emphasis">
            <p>ID: <span id="id"></span></p>
            <p>Name: <span id="name"></span></p>
            <p>Category: <span id="category"></span></p>
            <p>Price: <span id="price"></span></p>
            <p>Rating: <span id="rating"></span></p>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center">
      <p>&copy 2026 ProductHive. All rights reserved.</p>
    </footer>
    <script>
      let id = new URL(window.location.href).searchParams.get('id');

      let products = [
        {
          id: '1',
          name: 'Rhode Mascara',
          category: 'Eye Makeup',
          price: '₹599',
          rating: '4.5 ⭐',
        },
        {
          id: '2',
          name: 'Hot Pink lipstick',
          category: 'Lip Makeup',
          price: '₹759',
          rating: '4.2 ⭐',
        },
        {
          id: '3',
          name: 'Lush Blush',
          category: 'Face Makeup',
          price: '₹1999',
          rating: '4.6 ⭐',
        },
        {
          id: '4',
          name: 'Swiss Foundation',
          category: 'Face Makeup',
          price: '₹2199',
          rating: '4.7 ⭐',
        },
      ];

      let product = products.find((p) => p.id === id);

      document.getElementById('id').innerText = product.id;
      document.getElementById('name').innerText = product.name;
      document.getElementById('category').innerText = product.category;
      document.getElementById('price').innerText = product.price;
      document.getElementById('rating').innerText = product.rating;
    </script>
  </body>
</html>
