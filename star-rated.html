<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Star Rated Page</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="py-4 mx-3 bg-warning-subtle text-warning-emphasis">
      <h1 class="m-2">ProductHive</h1>
      <nav class="navbar navbar-expand-lg mx-3">
        <ul class="list-unstyled d-flex gap-5">
          <li>
            <a href="index.html" class="text-decoration-none text-black"
              >Home</a
            >
          </li>
          <li>
            <a href="products.html" class="text-decoration-none text-black"
              >Products</a
            >
          </li>
          <li>
            <a href="star-rated.html" class="text-decoration-none text-black"
              >Star Rated</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <h2 class="m-4 text-center">Top Rated Product</h2>
      <div class="card container my-4" style="width: 18rem">
        <img
          src="https://images.pexels.com/photos/20339288/pexels-photo-20339288.png"
          class="card-img-top"
          alt="A light foundation"
        />
        <div class="card-body">
          <h5 class="card-title">Swiss Foundation</h5>
          <p class="card-text">Star Rating: 4.6 ⭐</p>
        </div>
      </div>
      <h2 class="text-center">Most Popular Product</h2>
      <div class="card container my-4" style="width: 18rem">
        <img
          src="https://images.pexels.com/photos/4841239/pexels-photo-4841239.jpeg"
          class="card-img-top"
          alt="A Lip Mask"
        />
        <div class="card-body">
          <h5 class="card-title">Misolo Lip Mask</h5>
          <p class="card-text">Most popular product among teenagers</p>
        </div>
      </div>
    </main>
    <footer class="text-center">
      <p>&copy 2026 ProductHive. All rights reserved.</p>
    </footer>
